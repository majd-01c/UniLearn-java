# Database Configuration - mirrors Symfony .env
# Docker MySQL container credentials
db.url=jdbc:mysql://127.0.0.1:3306/app?serverTimezone=UTC
db.user=app
db.password=!ChangeMe!
db.driver=com.mysql.cj.jdbc.Driver
hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.show_sql=false
hibernate.format_sql=true
hibernate.hbm2ddl.auto=update
hikari.maximumPoolSize=10
hikari.minimumIdle=2
hikari.idleTimeoutMs=300000
hikari.connectionTimeoutMs=20000
