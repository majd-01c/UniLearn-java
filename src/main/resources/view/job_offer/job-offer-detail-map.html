<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Job Location</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #dff2fb;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #dff2fb;
        }

        .leaflet-control-attribution,
        .leaflet-control-zoom {
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
        }

        .leaflet-popup-content-wrapper {
            border-radius: 14px;
            border: 1px solid rgba(65, 101, 203, 0.18);
            box-shadow: 0 16px 38px rgba(15, 23, 42, 0.14);
        }

        .leaflet-popup-content {
            margin: 12px 14px;
            font-size: 13px;
            line-height: 1.45;
            color: #162033;
        }
    </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map', { zoomControl: true }).setView([36.8189, 10.1658], 6);
var marker = null;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
}).addTo(map);

setTimeout(function() {
    map.invalidateSize();
}, 220);

function updateMarker(lat, lng, label) {
    if (marker) {
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lng]).addTo(map);
    marker.bindPopup('<b>Job Location</b><br>' + label).openPopup();
    map.setView([lat, lng], 11);
    map.invalidateSize();
}

function showLocation(address) {
    var query = (address || '').trim();
    if (!query) {
        return;
    }

    var url = 'https://nominatim.openstreetmap.org/search?format=json&q='
        + encodeURIComponent(query) + '&limit=1';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.setRequestHeader('Accept-Language', 'en');
    xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4 || xhr.status !== 200) {
            return;
        }
        try {
            var data = JSON.parse(xhr.responseText);
            if (data && data.length > 0) {
                var lat = parseFloat(data[0].lat);
                var lng = parseFloat(data[0].lon);
                updateMarker(lat, lng, data[0].display_name || query);
            }
        } catch (e) {
            // Keep the map usable even if the geocoder response is malformed.
        }
    };
    xhr.send();
}
</script>
</body>
</html>
